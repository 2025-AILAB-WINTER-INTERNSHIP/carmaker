# Runtime parameters for segmentation_inference_node.py.

# Required: set this to a trained checkpoint from train.py.
checkpoint_path: ""

# Optional: override or supplement the config embedded in the checkpoint.
config_path: ""

device: ""
image_size: ""

# ROS I/O mode.
#
# bundle:
#   Subscribe to carmaker_msgs/CameraBundle from the image synchronizer.
#   Publish another CameraBundle with the same header/names/infos, but with images
#   replaced by mono8 segmentation class maps.
#
# image:
#   Subscribe to one sensor_msgs/Image and publish one mono8 sensor_msgs/Image class map.
input_mode: "bundle"

bundle_topic: "/synced/bundle"
class_map_bundle_topic: "/segmentation/class_map_bundle"

image_topic: "/camera/image_raw"
class_map_topic: "/segmentation/class_map"

input_encoding: "bgr8"
queue_size: 1
bundle_batch_inference: true
bundle_batch_size: 4

# Print inference latency/FPS to the ROS log for debugging.
log_timing: true
timing_log_interval: 1.0
