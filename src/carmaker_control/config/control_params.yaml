topics:
  subscribe:
    trajectory: "/planning/trajectory"
    odom: "/localization/odom"
    dynamics: "/carmaker/dynamic_info"
  publish:
    control: "/carmaker/control_signal"

setting:
  # 경로가 없거나 localization/planning 입력이 끊기면 neutral + brake 명령을 유지한다.
  publish_stop_without_path: true

control:
  rate: 30.0
  # 현재 차량 상태 입력 선택.
  # odom: localization이 publish하는 /localization/odom 사용
  # dynamics: CarMaker GT /carmaker/dynamic_info 사용
  state_source: "dynamics"

  # localization odometry가 이 시간 이상 갱신되지 않으면 정지 명령을 낸다.
  odom_timeout: 0.5
  # dynamics GT 입력이 이 시간 이상 갱신되지 않으면 정지 명령을 낸다.
  dynamics_timeout: 0.5
  # Local planner가 active trajectory publish를 멈추면 이 시간 뒤 neutral + brake로 돌아간다.
  active_trajectory_timeout: 1.0
  stop_trajectory_velocity_epsilon: 0.000001

  # segment 완료 판정 전에는 target velocity가 0이어도 이 속도 이상으로 추종한다.
  # planner가 publish한 all-zero trajectory는 정지/선제 조향 단계로 보고 0속도를 유지한다.
  min_tracking_speed: 0.20
  # Tight parking speed cap. Planning profiler도 같은 0.7 m/s 상한을 사용한다.
  max_target_speed: 10

  # nearest point 기준으로 일정 거리 앞의 point에서 target speed를 읽는다.
  # 실제 lookahead = lookahead_distance + lookahead_time * current_speed 이며 min/max로 제한된다.
  lookahead_distance: 0.35
  lookahead_time: 0.2
  min_lookahead_distance: 0.2
  max_lookahead_distance: 0.8
  # Stanley feedback은 nearest 기준으로 두고, 곡률 feedforward만 더 앞을 본다.
  # preview_distance 지점 주변 preview_window 구간의 평균 곡률로 선제 조향을 만든다.
  curvature_preview_distance: 0.8
  curvature_preview_window: 0.4

  # nearest index가 경로 위에서 크게 튀지 않도록 이전 index 주변만 검색한다.
  nearest_search_back: 20
  nearest_search_ahead: 120

  # PID 출력 가속도 명령을 gas/brake/accel 필드로 변환할 때 쓰는 한계값.
  max_accel: 0.8
  max_decel: 1.5
  max_gas: 0.35
  max_brake: 1.0
  stop_brake: 0.4

  drive_gear: 1
  neutral_gear: 0
  reverse_gear: -1

pid:
  speed:
    kp: 1.0
    ki: 0.0
    kd: 0.05

stanley:
  # Stanley 조향 파라미터. max_steer_angle_deg는 타이어 조향각 기준이다.
  # Ioniq 5 설정값(wheelbase 2.97m, min_turning_radius 5.5m)으로 계산하면 약 28.4deg다.
  # 후진에서는 heading 항만 후진 yaw dynamics에 맞게 반대로 적용하고,
  # lateral error 항은 path 좌우 기준을 유지한다.
  k: 2.5
  k_soft: 0.15
  cte_gain: 2.0
  heading_gain: 1.8
  max_steer_angle_deg: 28.4
  reverse_steering_scale: 1.3
  # Trajectory curvature 기반 feedforward. 큰 주차 곡률에서 feedback보다 먼저 조향한다.
  curvature_ff_gain: 1.0
  # 후진에서는 같은 조향각이 yaw를 반대로 변화시키므로 curvature feedforward 부호도 반대로 둔다.
  reverse_curvature_ff_sign: -1.0

vehicle:
  wheelbase: 2.97
  min_turning_radius: 5.5
  # Stanley는 타이어 조향각을 계산한다. CarMaker control_signal/steerangle은
  # steering wheel command 범위로 보고 tight parking에서는 4.5까지 허용한다.
  steering_ratio: 14.0
  max_steer_command: 8.5
  # 조향 부호가 반대로 보이면 -1.0으로 바꿔서 테스트한다.
  steering_command_sign: 1.0

debug:
  # PlotJuggler/RViz 진단용 토픽을 publish한다.
  publish: true
  topic_prefix: "/control/debug"
  frame_id: "Fr0"
  # active_path는 너무 자주 내보내지 않도록 별도 주기를 둔다. 0 이하면 매 tick publish.
  path_publish_period: 1.0
