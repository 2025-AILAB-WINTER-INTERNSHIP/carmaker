topics:
  subscribe:
    trajectory: "/planning/trajectory"
    odom: "/localization/odom"
    dynamics: "/carmaker/dynamic_info"
  publish:
    control: "/carmaker/control_signal"

setting:
  # 경로가 없거나 localization/planning 입력이 끊기면 neutral + brake 명령을 유지한다.
  publish_stop_without_path: true

control:
  # Loop and state source ------------------------------------------------------
  rate: 100.0
  # odom: localization이 publish하는 /localization/odom 사용
  # dynamics: CarMaker GT /carmaker/dynamic_info 사용
  state_source: "dynamics"

  # Input freshness -----------------------------------------------------------
  # 각 입력이 이 시간 이상 갱신되지 않으면 정지 명령을 낸다.
  odom_timeout: 0.5
  dynamics_timeout: 0.5
  # Local planner active trajectory가 이 시간 이상 갱신되지 않으면 no-trajectory 상태로 본다.
  active_trajectory_timeout: 1.0
  stop_trajectory_velocity_epsilon: 0.000001

  # Target speed selection ----------------------------------------------------
  # segment 완료 판정 전에는 target velocity가 0이어도 이 속도 이상으로 추종한다.
  # planner가 publish한 all-zero trajectory는 정지/선제 조향 단계로 보고 0속도를 유지한다.
  min_tracking_speed: 0.25
  min_creep_speed: 0.20
  arrival_slow_distance: 1.0
  # Parking speed cap.
  max_target_speed: 0.5

  # 내륜차 보정
  off_tracking_mode: 1 # 보정 모드 (0: Disabled, 1: PureRear, 2: Weighted, 3: MinAbs)
  front_curvature_weight: 0.0 # 전륜 곡률 가중치 (1.0 - front_curvature_weight는 후륜 가중치)
  off_tracking_fade_distance: 1.485 # 내륜차 보정 오프셋 감쇄 거리 # 2.97(휠베이스), 0.89(전륜->전방범퍼), 1.485(휠베이스/2)
  tracking_pose_fade_distance: 0 # 제어 피드백 추적점 감쇄 거리

  # 전진용 Lookahead
  forward:
    lookahead_distance: 0
    lookahead_time: 0
    min_lookahead_distance: 0
    max_lookahead_distance: 0
    curvature_preview_distance: 0 # 선제 곡률 계산 위치
    curvature_preview_window: 0
    control_lookahead: 0.0 # 전진 Stanley 피드백 횡오차/헤딩 계산점 추가 전방 투영 거리

  # 후진용 Lookahead
  reverse:
    lookahead_distance: 0
    lookahead_time: 0
    min_lookahead_distance: 0
    max_lookahead_distance: 0
    curvature_preview_distance: 0 # 선제 곡률 계산 위치
    curvature_preview_window: 0.0
    control_lookahead: 0.3 # 후진 Stanley 피드백 횡오차/헤딩 계산점 전방 투영 거리

  # Path index tracking -------------------------------------------------------
  # nearest index가 경로 위에서 크게 튀지 않도록 이전 index 주변만 검색한다.
  nearest_search_back: 20
  nearest_search_ahead: 120

  # Longitudinal output limits ------------------------------------------------
  # PID 출력 가속도 명령을 gas/brake/accel 필드로 변환할 때 쓰는 한계값.
  max_accel: 0.8
  max_decel: 1.5
  max_gas: 0.35
  max_brake: 1.0
  stop_brake: 0.4

  # No-trajectory release -----------------------------------------------------
  # planner가 idle/no-trajectory 상태가 되면 release_duration 동안만 stop command를 발행한다.
  # true이면 그 시간 동안 조향각을 0으로 ramp-down한 뒤 control_signal 발행을 멈춘다.
  steer_release_after_idle: true
  release_duration: 1.0

  # Gear mapping --------------------------------------------------------------
  drive_gear: 1
  neutral_gear: 0
  reverse_gear: -1

pid:
  speed:
    kp: 1.0
    ki: 0.0
    kd: 0.05

stanley:
  # Stanley 조향 파라미터. max_steer_angle_deg는 타이어 조향각 기준이다.
  # [실측 기반 계산]
  #   Vhcl_FL_rz 물리 최대각: ±0.580 rad (33.2°)
  #   Steer_WhlAng 핸들 최대각: ±8.38 rad
  #   → steering_ratio = 8.38 / 0.580 = 14.45
  #   → 이론 min_turning_radius = 2.97 / tan(0.580) ≈ 4.57 m
  #   → 실측 유효 회전 반경: ~10 m (타이어 슬립 / CarMaker 모델 특성)
  #   → max_steer_angle_deg = 33.2° (실측 물리 한계)
  max_steer_angle_deg: 33.2 # 실측 물리 최대 타이어각

  # 전진용 Stanley 제어 파라미터 (안정성 및 밀림 방지 위주)
  forward:
    k: 1.5 # 횡오차 복귀 강도
    k_soft: 0.3 # 저속 분모 보정
    cte_gain: 1.0 # 횡오차 gain
    heading_gain: 1.2 # 헤딩 오차 gain
    curvature_ff_gain: 0 # 곡률 feedforward gain

  # 후진용 Stanley 제어 파라미터 (후진 민감성/조향 댐핑 위주)
  reverse:
    k: 1.5
    k_soft: 0.3
    cte_gain: 1.0
    heading_gain: 1.2
    curvature_ff_gain: 1.0
    reverse_curvature_ff_sign: -1.0

vehicle:
  wheelbase: 2.97
  rear_axle_offset: 0.82 # 후방 범퍼와 후륜 축 사이의 거리
  min_turning_radius: 5.5 # 유효 회전 반경
  # Stanley는 타이어 조향각을 계산한다.
  # steering_ratio = Steer_WhlAng / Vhcl_FL_rz = 8.38 / 0.580 = 14.45
  steering_ratio: 14.45 # 실측 역산값
  # max_steer_command = 핸들 물리 최대각 = 8.38 rad
  max_steer_command: 8.38 # 실측 핸들 최대각
  # 조향 부호가 반대로 보이면 -1.0으로 바꿔서 테스트한다.
  steering_command_sign: 1.0

debug:
  # PlotJuggler/RViz 진단용 토픽을 publish한다.
  publish: true
  topic_prefix: "/control/debug"
  frame_id: "Fr0"
  # active_path는 너무 자주 내보내지 않도록 별도 주기를 둔다. 0 이하면 매 tick publish.
  path_publish_period: 1.0
