topics:
  subscribe:
    trajectory: "/planning/trajectory"
    odom: "/localization/odom"
    dynamics: "/carmaker/dynamic_info"
  publish:
    control: "/carmaker/control_signal"

setting:
  # 경로가 없거나 localization/planning 입력이 끊기면 neutral + brake 명령을 유지한다.
  publish_stop_without_path: true

control:
  rate: 30.0
  # 현재 차량 상태 입력 선택.
  # odom: localization이 publish하는 /localization/odom 사용
  # dynamics: CarMaker GT /carmaker/dynamic_info 사용
  state_source: "odom"

  # localization odometry가 이 시간 이상 갱신되지 않으면 정지 명령을 낸다.
  odom_timeout: 0.5
  # dynamics GT 입력이 이 시간 이상 갱신되지 않으면 정지 명령을 낸다.
  dynamics_timeout: 0.5
  # Parking trajectory can take longer at 0.7 m/s, so keep the latched plan valid long enough.
  trajectory_timeout: 300.0

  # /planning/trajectory의 longitudinal_velocity 부호로 전진/후진 segment를 나눈다.
  # 이 값보다 작은 속도는 정지점으로 보고 이전 direction에 붙인다.
  direction_velocity_epsilon: 0.02

  # segment 완료 판정이 나기 전까지 target velocity가 0이어도 멈춰 서지 않게 하는 최소 추종 속도.
  # 완료 판정 후에는 별도 stop/gear switch 로직이 brake와 다음 gear 전환을 처리한다.
  min_tracking_speed: 0.20
  # Tight parking speed cap. Planning profiler도 같은 0.7 m/s 상한을 사용한다.
  max_target_speed: 0.7

  # nearest point 기준으로 일정 거리 앞의 point에서 target speed를 읽는다.
  # 실제 lookahead = lookahead_distance + lookahead_time * current_speed 이며 min/max로 제한된다.
  lookahead_distance: 0.35
  lookahead_time: 0.2
  min_lookahead_distance: 0.2
  max_lookahead_distance: 0.8

  # nearest index가 경로 위에서 크게 튀지 않도록 이전 index 주변만 검색한다.
  nearest_search_back: 20
  nearest_search_ahead: 120

  # segment 완료 판정. 끝 index 근처이면서 끝점 위치와도 가까워야 다음 gear segment로 넘어간다.
  segment_finish_distance: 0.5
  segment_finish_index_margin: 3

  # 전진/후진 segment 전환 전 차량 속도가 이 값 이하가 될 때까지 brake를 유지한다.
  gear_switch_speed: 0.08
  # 다음 segment로 넘어갈 때 정지 상태에서 먼저 다음 segment 조향각을 보낸 뒤 출발한다.
  presteer_enabled: true
  presteer_duration: 0.6

  # PID 출력 가속도 명령을 gas/brake/accel 필드로 변환할 때 쓰는 한계값.
  max_accel: 0.8
  max_decel: 1.5
  max_gas: 0.35
  max_brake: 1.0
  stop_brake: 0.4

  drive_gear: 1
  neutral_gear: 0
  reverse_gear: -1

pid:
  speed:
    kp: 1.0
    ki: 0.0
    kd: 0.05

stanley:
  # Stanley 조향 파라미터. max_steer_angle_deg는 타이어 조향각 기준이다.
  # Ioniq 5 설정값(wheelbase 2.97m, min_turning_radius 5.5m)으로 계산하면 약 28.4deg다.
  # 후진에서는 heading 항만 후진 yaw dynamics에 맞게 반대로 적용하고,
  # lateral error 항은 path 좌우 기준을 유지한다.
  k: 2.5
  k_soft: 0.15
  cte_gain: 2.0
  heading_gain: 1.8
  max_steer_angle_deg: 28.4
  reverse_steering_scale: 1.3
  # Trajectory curvature 기반 feedforward. 큰 주차 곡률에서 feedback보다 먼저 조향한다.
  curvature_ff_gain: 0.6
  # 후진에서는 같은 조향각이 yaw를 반대로 변화시키므로 curvature feedforward 부호도 반대로 둔다.
  reverse_curvature_ff_sign: -1.0

vehicle:
  wheelbase: 2.97
  min_turning_radius: 5.5
  # DynamicsInfo.Car_x/y 입력 기준점.
  # controller 내부 pose와 /planning/trajectory는 rear axle 기준으로 맞춘다.
  # rear_bumper: Car_x/y가 Fr1A/rear bumper center이면 rear_axle_offset만큼 앞으로 변환한다.
  # rear_axle: Car_x/y가 rear axle center이면 그대로 사용한다.
  rear_axle_offset: 0.82
  dynamics_pose_reference: "rear_bumper"
  # Stanley는 타이어 조향각을 계산한다. CarMaker control_signal/steerangle은
  # steering wheel command 범위로 보고 tight parking에서는 4.5까지 허용한다.
  steering_ratio: 9.0
  max_steer_command: 4.5
  # 조향 부호가 반대로 보이면 -1.0으로 바꿔서 테스트한다.
  steering_command_sign: 1.0
  # /planning/trajectory와 현재 pose는 기본적으로 rear axle 기준이다.
  # 필요할 때만 rear_bumper로 바꿔 Stanley 오차 계산 기준점을 이동한다.
  steering_control_point: "rear_axle"

debug:
  # PlotJuggler/RViz 진단용 토픽을 publish한다.
  publish: true
  topic_prefix: "/control/debug"
  frame_id: "Fr0"
  # active_segment_path는 너무 자주 내보내지 않도록 별도 주기를 둔다. 0 이하면 매 tick publish.
  path_publish_period: 1.0
