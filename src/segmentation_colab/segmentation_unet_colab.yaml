# Google Colab training template for CarMaker semantic segmentation.
#
# In Colab, prefer absolute paths under Google Drive. The notebook at
# src/segmentation_colab/segmentation_colab.ipynb can generate this config
# automatically.

data_root: /content/drive/MyDrive/carmaker_segmentation/data
manifest: /content/drive/MyDrive/carmaker_segmentation/data/csv/manifest.csv
cameras: front,left,rear,right
use_raw_post_processed: false

# Original CarMaker image size. This matches the local training config.
image_size: [1920, 1080]
num_workers: 4
batch_size: 1
val_ratio: 0.2
test_ratio: 0.1
stratify_by_camera: true
seed: 42

epochs: 16
learning_rate: 0.001
weight_decay: 0.0001
model:
  name: unet
  in_channels: 3
  base_channels: 32
  activation: relu
  weight_init: he_normal

loss: focal
class_weights: [5.0, 15.0, 10.0]
dice_exclude_classes: [0]

checkpoint_interval: 4
image_log_interval: 1
# TensorBoard debug grids use one tag per split. Inside each grid, camera
# samples are arranged by column, so 8 means up to 8 rows per camera.
debug_image_count: 8
# Base directory. train.py creates a {loss}_ep{epochs}_{timestamp} subfolder.
run_dir: /content/drive/MyDrive/carmaker_segmentation/runs
