# CarMaker Vehicle Parameters
# These values should be updated to match the specific vehicle model used in CarMaker.

vehicle:
  # Vehicle Dimensions (Relative to Fr1A)
  width: 1.89                    # [m] - Width of the vehicle
  length: 4.635                 # [m] - Length of the vehicle
  height: 1.605                 # [m] - Height of the vehicle

  # Vehicle Kinematics
  rear_axle_offset_x: 0.82      # [m] - Rear axle X offset from Fr1A
  center_offset_x: 2.3175       # [m] - Geometric center for visualization from Fr1A (length/2)
  cg_offset_x: 2.635            # [m] - Center of Gravity from Fr1A
  front_axle_offset_x: 3.79     # [m] - Front axle X offset from Fr1A

  # 축간거리: 앞바퀴 축과 뒷바퀴 축 사이의 거리
  wheelbase: 2.97               # [m] - Distance between front and rear axles

  # 스티어링 기어비 (Steering Ratio)
  # - 시뮬레이터에서 핸들 각도(Steer_WhlAng)를 이용해 타이어 조향각을 계산할 때 사용되는 비율
  # - 현재 EKF 예측 단계는 핸들 각도 대신 실제 앞바퀴 타이어 조향각(Vhcl_FL_rz, Vhcl_FR_rz의 평균)을
  #   직접 수집하여 사용하므로 기어비 변환이 필요 없어 1.0으로 설정
  # - 앞바퀴 타이어 각도 대신 핸들 각도(Steer_WhlAng)를 제어 입력으로 사용할 경우,
  #   해당 차량 모델의 실제 조향 기어비(예: 13.0 ~ 18.0)로 설정 필요
  steering_ratio: 1.0

  # 윤거(타이어 중심 간 거리)
  track_width: 1.634            # [m] - Distance between left and right wheels

  # 타이어 계산 (RT 245/35R19)
  # - 단면폭 (Width): 245 mm = 0.245 m
  # - 편평비 (Aspect Ratio): 35% (0.35)
  # - 사이드월 높이 (Sidewall): 245 * 0.35 = 85.75 mm = 0.08575 m
  # - 휠 직경 (Rim Diameter): 19 inch = 19 * 25.4 mm = 482.6 mm = 0.4826 m
  # - 전체 직경 (Total Diameter): (사이드월 * 2) + 휠 직경 = 654.1 mm (0.6541 m)
  # - 타이어 반지름 (Radius): 654.1 / 2 = 327.05 mm (약 0.327 m)
  # - 이론적 타이어 반지름 (Unloaded Radius): 약 0.327 m
  # - 정적 하중 시 타이어 반지름 (Loaded Radius / CarMaker Wheel Z-pos): 0.298 m
  tire_radius: 0.298            # [m] - Effective rolling radius

  # Sensor Extrinsics (Relative to Fr1A / rear bumper center at z=0)
  imu_0:
    offset_x: 2.29
    offset_y: 0.0
    offset_z: 0.298
  imu_1:
    offset_x: 3.79
    offset_y: 0.0
    offset_z: 0.298
