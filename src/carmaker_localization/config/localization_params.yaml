topics:
  publish:
    pose: "/localization/pose"
    odom: "/localization/odom"
    data:
      estimation_pose: "/localization/data/estimation_pose"
      correction_pose: "/localization/data/correction_pose"
      features_prefix: "/localization/data/features"
    debug:
      svm_image: "/localization/debug/svm_image"
      observation_prefix: "/localization/debug/observation"
      estimation_markers: "/localization/debug/estimation_markers"
      correction_markers: "/localization/debug/correction_markers"
      estimation_trajectory: "/localization/debug/estimation_trajectory"
  subscribe:
    dynamics: "/carmaker/dynamic_info"
    use_bundle: true
    bundle: "/synced/bundle"
    channels:
      - name: front
        frame: front_optical
        input_topic: /segmentation/front/class_image
        info_topic: /synced/front/camera_info
        bev_x_range: [4.68, 7.68]
        bev_y_range: [-3.0, 3.0]

      - name: rear
        frame: rear_optical
        input_topic: /segmentation/rear/class_image
        info_topic: /synced/rear/camera_info
        bev_x_range: [-3.0, 0.0]
        bev_y_range: [-3.0, 3.0]

      - name: left
        frame: left_optical
        input_topic: /segmentation/left/class_image
        info_topic: /synced/left/camera_info
        bev_x_range: [-3.0, 7.68]
        bev_y_range: [0.0, 3.0]

      - name: right
        frame: right_optical
        input_topic: /segmentation/right/class_image
        info_topic: /synced/right/camera_info
        bev_x_range: [-3.0, 7.68]
        bev_y_range: [-3.0, 0.0]

setting:
  image_type: "raw" # "gt" or "segmentation" or "raw"

frames:
  global: "Fr0"
  prediction: "Fr1A_pred"

feature_extractor:
  fusion: true # True : 개별 채널별 특징점 융합 후 매칭 수행, False : 개별 채널 별 매칭 수행

  bev:
    resolution: 0.05  # [m/pixel]

  extraction:
    r_max: 15.0         # 특징점 최대 감지 거리 [m]
    covariance_k: 1.0   # 방사 방향 공분산 스케일 계수

svm:
  seam_front_offset: -2.3175    # -Length/2 = -2.3175 (Geometric Center)
  seam_rear_offset: 2.3175      # Length/2 = 2.3175 (Geometric Center)
  seam_slope_front: 0.409924    # Width / Length = 1.9 / 4.635 = 0.409924 (Diagonal Slope)
  seam_slope_rear: 0.409924     # Width / Length = 1.9 / 4.635 = 0.409924 (Diagonal Slope)
  footprint_margin: 0.15

ekf:
  dimension: 2                  # 2D (추후 3D 전환 시 3으로 변경)
  frequency: 100.0              # ekf state 업데이트 주기 [Hz]
  state_buffer_duration: 0.5    # state_buffer_duration : state_buffer의 지속 시간, 지연 보상 버퍼 길이 [s]

  # initial_state: [0.0, 0.0, 0.0]  # 초기 상태 설정: [x(m), y(m), yaw(deg)]. GT 사용 시 주석 처리

  imu:
    imu_id: 0                   # 0 또는 1 선택 (0: 차량 중심, 1: 차량 앞 바퀴 축)
    acc_std: 0.1                # acc_std : 가속도 노이즈 [m/s^2]
    gyro_std: 0.01              # gyro_std : 자이로 노이즈 [rad/s]
  wheel_noise:
    speed_std: 0.05             # speed_std : encoder 노이즈 [m/s]
    slip_threshold: 0.5         # slip_threshold : 휠 슬립 임계값 [%]
  vision_noise:
    base_std: 0.1               # vision_noise : vision 노이즈 [m]
  divergence_threshold: 100.0   # divergence_threshold : 필터 발산 판정 임계값 (Trace(P))

map_matcher:
  enable: false                 # True : 매칭 수행, False : 매칭 미수행 (디버깅용)
  type: "icp"                   # "icp" | 추후 "ndt", "point_to_line" 추가
  map_format: "osm"             # "osm" | 추후 "lanelet2", "pcd" 추가
  map_file: ""                  # launch argument로 지정
  search_radius: 20.0           # 지도 조회 반경 [m]
  fitness_threshold: 0.5        # 매칭 유효 판정 임계값
  max_iterations: 50            # ICP 반복 횟수
