services:
  get_map: "/localization/get_map"

topics:
  publish:
    pose: "/localization/pose"
    odom: "/localization/odom"
    data:
      estimation_pose: "/localization/data/estimation_pose"
      correction_pose: "/localization/data/correction_pose"
      features_prefix: "/localization/data/features"
      rmse_position: "/localization/data/rmse_position"
      rmse_orientation: "/localization/data/rmse_orientation"
      nees: "/localization/data/nees"
    debug:
      svm_image: "/localization/debug/svm_image"
      map_features: "/localization/debug/map_features"
      observation_prefix: "/localization/debug/observation"
      estimation_markers: "/localization/debug/estimation_markers"
      correction_markers: "/localization/debug/correction_markers"
      estimation_trajectory: "/localization/debug/estimation_trajectory"
      bev_image_prefix: "/localization/debug/bev_image"
      r_wheel_vx: "/localization/debug/r_wheel_vx"
      r_wheel_yaw_rate: "/localization/debug/r_wheel_yaw_rate"
      r_imu_yaw_rate: "/localization/debug/r_imu_yaw_rate"
  subscribe:
    dynamics: "/carmaker/dynamic_info"
    use_bundle: true
    bundle: "/segmentation/class_map_bundle"
    channels:
      - name: front
        frame: front_optical
        input_topic: /segmentation/front/class_image
        info_topic: /synced/front/camera_info
        bev_x_range: [4.68, 7.68]
        bev_y_range: [-3.0, 3.0]
        max_fov: 210.0
        covariance_k: 0.0225

      - name: rear
        frame: rear_optical
        input_topic: /segmentation/rear/class_image
        info_topic: /synced/rear/camera_info
        bev_x_range: [-3.0, 0.0]
        bev_y_range: [-3.0, 3.0]
        max_fov: 210.0
        covariance_k: 0.0225

      - name: left
        frame: left_optical
        input_topic: /segmentation/left/class_image
        info_topic: /synced/left/camera_info
        bev_x_range: [-3.0, 7.68]
        bev_y_range: [0.0, 3.0]
        max_fov: 210.0
        covariance_k: 0.056

      - name: right
        frame: right_optical
        input_topic: /segmentation/right/class_image
        info_topic: /synced/right/camera_info
        bev_x_range: [-3.0, 7.68]
        bev_y_range: [-3.0, 0.0]
        max_fov: 210.0
        covariance_k: 0.056

setting:
  image_type: "segmentation" # "gt" or "segmentation" or "raw"

frames:
  global: "Fr0"
  prediction_bumper: "Fr1A_Pred"
  prediction_rear_axle: "Fr1A_Rear_Axle_Pred"

feature_extractor:
  fusion: true # True : 개별 채널별 특징점 융합 후 정합 수행, False : 개별 채널 별 정합 수행

  bev:
    resolution: 0.05 # [m/pixel]

  bev_vis:
    x_range: [-20.0, 20.0]
    y_range: [-20.0, 20.0]

  extraction:
    r_max: 15.0 # 특징점 최대 감지 거리 [m]

svm:
  viz_seam_line: true # 심라인 시각화 유무
  seam_front_offset: -2.3175 # -Length/2 = -2.3175 (Geometric Center)
  seam_rear_offset: 2.3175 # Length/2 = 2.3175 (Geometric Center)
  seam_slope_front: 0.409924 # Width / Length = 1.9 / 4.635 = 0.409924 (Diagonal Slope)
  seam_slope_rear: 0.409924 # Width / Length = 1.9 / 4.635 = 0.409924 (Diagonal Slope)
  footprint_margin: 0.15

ekf:
  dimension: 2 # 2D (추후 3D 전환 시 3으로 변경)
  frequency: 100.0 # ekf state 업데이트 주기 [Hz]
  # initial_state: [0.0, 0.0, 0.0]  # 초기 상태 설정: [x(m), y(m), yaw(deg)]. GT 사용 시 주석 처리

  process_noise:
    pos_std: 0.05 # [m] - 시스템 모델(예측)의 위치(X, Y) 오차 허용 폭. 낮을수록 EKF 예측 궤적을 강하게 신뢰하고, 높을수록 비전(ICP) 보정치를 적극 수용
    yaw_std: 0.03 # [rad] - 시스템 모델의 요각(YAW) 오차 허용 폭. 낮을수록 오도메트리 회전각을 신뢰하고, 높을수록 비전 방향 보정을 강하게 반영
    vel_std: 0.15 # [m/s] - 등속 예측 모델의 선속도(VX) 오차 변동 허용 폭. 높을수록 EKF가 자신의 등속 예측을 덜 신뢰하고 휠 속도의 급감속/가속 관측을 지연 없이 즉각 수집
    yaw_rate_std: 0.01 # [rad/s] - 등속 예측 모델의 요레이트(YAW_RATE) 오차 변동 허용 폭. 높을수록 자이로/휠 센서의 급격한 요레이트 변화를 유연하게 수용
    bias_std: 0.001 # [rad/s] - 자이로 바이어스(B_YAW_RATE)의 실시간 변동 허용 폭. 높을수록 온도/진동에 따른 자이로 누적 오프셋 바이어스를 빠르게 수렴시켜 추정

  rate_limiter:
    max_position_step: 0.15 # [m] - 단일 EKF 스텝(10ms)당 최대 허용 위치 보정량 (부드러운 수렴)
    max_yaw_step: 0.05 # [rad] - 단일 EKF 스텝(10ms)당 최대 허용 요각 보정량 (~2.8 deg)

  imu:
    imu_id: 0 # 0 또는 1 선택 (0: 차량 중심, 1: 차량 앞 바퀴 축)
    imu_acc_std: 0.1 # imu_acc_std : 가속도 노이즈 [m/s^2]
    gyro_std: 0.01 # gyro_std : 자이로 노이즈 [rad/s]
  wheel:
    speed_std: 0.05 # speed_std : encoder 노이즈 [m/s]
    slip_threshold_long: 1.0 # 종방향 휠 슬립 속도 임계값 [m/s]
  camera:
    base_std: 0.1 # camera : vision 위치 노이즈 [m]
    base_yaw_std: 0.02 # camera : vision 자세 노이즈 [rad] (~1.15 deg)
  divergence_threshold: 100.0 # divergence_threshold : 필터 발산 판정 임계값 (Trace(P))

feature_registration:
  enable: true # True : 정합 수행, False : 정합 미수행 (디버깅용)
  type: "icp" # "icp" | 추후 "ndt", "point_to_line" 추가
  map_format: "osm" # "osm" | 추후 "lanelet2", "pcd" 추가
  map_file: "" # launch argument로 지정
  search_radius: -1.0 # 지도 조회 반경 [m] (음수 설정 시 전체 맵 피처 사용 - 위치 유실 및 소형 맵 복구용)
  min_search_radius: 5.0 # 최소 ICP 탐색 반경 [m] (초기 위치 오차 극복용)
  fitness_threshold: 0.35 # 정합 유효 판정 임계값
  max_iterations: 50 # ICP 반복 횟수
  max_covariance: 10.0 # Eigen-capping 최대 공분산 분산 상한 [m^2 or rad^2] (unconstrained 방향 발산 방지)

  validation_gate:
    max_position_dev: 1.0 # [m] - EKF 예측치 기준 최대 허용 정합 위치 편차 (오정합 필터 차단)
    max_yaw_dev: 0.25 # [rad] - EKF 예측치 기준 최대 허용 정합 요각 편차 (~14.3 deg)
