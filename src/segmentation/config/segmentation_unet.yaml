# Standalone CarMaker fisheye semantic segmentation baseline.
#
# Run from /workspace:
#   python3 src/segmentation/tools/debug_dataset.py --count 10 --image-size 1920,1080
#   python3 src/segmentation/train.py --overfit-count 10 --epochs 50

data_root: ../../carmaker_image/data
manifest: ../../carmaker_image/data/csv/manifest.csv
cameras: front,left,rear,right
use_raw_post_processed: false

# Original CarMaker image size. This preserves the 16:9 geometry, but it is
# much heavier than 512x512, so start with batch_size: 1.
image_size: [1920, 1080]
num_workers: 4
batch_size: 1
val_ratio: 0.2
test_ratio: 0.1
stratify_by_camera: true
seed: 42

epochs: 16
learning_rate: 0.001
weight_decay: 0.0001
model:
  name: unet
  in_channels: 3
  base_channels: 32
  # Options: pytorch_default, he_normal, he_uniform, xavier_uniform, xavier_normal
  weight_init: he_normal

# Current GT class ids from carmaker_image/scripts/apply_mask.py:
#   0 background
#   1 lane
#   2 landmark

# Loss options:
#   cross_entropy      Standard pixel-wise CE loss.
#   dice               Region-overlap loss.
#   ce_dice            Cross entropy + Dice loss.
#   focal              Focuses more on hard pixels/classes.
#   focal_dice         Focal loss + Dice loss.
loss: focal
# class_weights is used directly by CrossEntropy/Focal terms only.
# It affects: cross_entropy, ce_dice CE term, focal, focal_dice Focal term.
# It does not affect the current DiceLoss term, which averages per-class Dice equally.
class_weights: [5.0, 15.0, 10.0]

checkpoint_interval: 4
image_log_interval: 1
debug_image_count: 8
# Base directory. train.py creates a timestamp-only subfolder for each run.
# Model/image/loss metadata is written inside TensorBoard under run/config and HParams.
run_dir: ../runs
