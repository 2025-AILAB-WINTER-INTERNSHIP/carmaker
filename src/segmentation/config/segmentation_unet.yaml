# Standalone CarMaker fisheye semantic segmentation baseline.
#
# Run from /workspace:
#   python3 src/segmentation/tools/debug_dataset.py --count 10 --image-size 1920,1080
#   python3 src/segmentation/train.py --overfit-count 10 --epochs 50

data_root: ../../carmaker_image/data
manifest: ../../carmaker_image/data/csv/manifest.csv
cameras: front,left,rear,right
use_raw_post_processed: false

# Original CarMaker image size. This preserves the 16:9 geometry, but it is
# much heavier than 512x512, so start with batch_size: 1.
image_size: [1920, 1080]
num_workers: 2
batch_size: 1
val_ratio: 0.2
test_ratio: 0.1
stratify_by_camera: true
seed: 42

epochs: 30
learning_rate: 0.001
weight_decay: 0.0001
model:
  name: unet
  in_channels: 3
  base_channels: 32

# Current GT class ids from carmaker_image/scripts/apply_mask.py:
#   0 background
#   1 lane
#   2 landmark
loss: cross_entropy
# class_weights: [0.2, 2.0, 3.0]

checkpoint_interval: 10
image_log_interval: 5
run_dir: ../runs/unet_carmaker
