# Standalone CarMaker fisheye semantic segmentation baseline.
#
# Run from /workspace:
#   python3 src/segmentation/tools/debug_dataset.py --count 10 --image-size 1920,1080
#   python3 src/segmentation/train.py --overfit-count 10 --epochs 50

data_root: ../../carmaker_image/data
manifest: ../../carmaker_image/data/csv/manifest.csv
cameras: front,left,rear,right
use_raw_post_processed: false

# Original CarMaker image size. This preserves the 16:9 geometry, but it is
# much heavier than 512x512, so start with batch_size: 1.
image_size: [1920, 1080]
num_workers: -1  # -1 = CPU 코어 수와 GPU 개수를 기반으로 자동 설정
batch_size: 2
val_ratio: 0.2
test_ratio: 0.1
split_by_scenario: true  # 시나리오(시퀀스) 단위 분할로 데이터 유출 방지
stratify_by_camera: false
seed: 42

# --- Dataset Manual Split (Optional) ---
# manual_split이 설정되면 val_ratio, test_ratio 및 자동 분할 로직은 무시됩니다.
# manual_split:
#   train: ["train00", "train01", "train02", "train03", "train04", "train06", "train07"]
#   val: ["train05"]
#   test: []

# --- Trainer & Profiling ---
trainer:
  max_epochs: 50
  accumulate_grad_batches: 2  # Gradient accumulation steps
  limit_train_batches: 1.0    # Training data usage (1.0 = 100%, float for %, int for count)
  gradient_clip_val: 1.0      # Prevent backward gradient explosion
  gradient_clip_algorithm: norm
  log_every_n_steps: 50
  # 프로파일러 설정: null(비활성), 'simple'(간단히), 'advanced'(상세히)
  # 프로파일러가 켜져 있으면(null이 아니면) 아래 'on_profiling' 설정이 적용되어 학습이 조기 종료됩니다.
  profiler: simple            # null, 'simple', 'advanced'

  # 프로파일링 모드 오버라이드: profiler가 활성화된 경우에만 적용되는 제한 설정입니다.
  # 전체 학습 대신 짧은 루프만 실행하여 성능 병목을 빠르게 확인하기 위함입니다.
  on_profiling:
    max_epochs: 1             # 프로파일링 시 실행할 최대 에포크
    limit_batches: 10         # 에포크당 실행할 최대 배치(Step) 수

learning_rate: 0.001
weight_decay: 0.0001
lr_scheduler: cosine  # Options: cosine, none
warmup_enabled: true  # 초기 에폭 동안 LR 워밍업 실행
warmup_epochs: 5      # 워밍업 에폭 수
warmup_start_factor: 0.1  # 시작 LR 값은 설정치의 10%

model:
  name: unet
  in_channels: 3
  base_channels: 32
  # Options: relu, leaky_relu, elu, gelu, silu
  activation: relu
  # Options: batch, group, instance, none
  norm: group
  # Options: pytorch_default, he_normal, he_uniform, xavier_uniform, xavier_normal
  weight_init: he_normal

# Current GT class ids from carmaker_image/scripts/apply_mask.py:
#   0 background
#   1 lane
#   2 landmark

# Loss options:
#   cross_entropy      Standard pixel-wise CE loss.
#   dice               Region-overlap loss.
#   ce_dice            Cross entropy + Dice loss.
#   focal              Focuses more on hard pixels/classes.
#   focal_dice         Focal loss + Dice loss.
loss: focal_dice
# class_weights is used directly by CrossEntropy/Focal terms only.
# It affects: cross_entropy, ce_dice CE term, focal, focal_dice Focal term.
# It does not affect the DiceLoss term.
class_weights: [1.0, 5.0, 1.5]
# Dice terms ignore background by default so lane/landmark dominate overlap loss.
dice_exclude_classes: [0]

checkpoint_interval: 5
image_log_interval: 5
debug_image_count: 8
debug_worst_sample_count: 4

# Base directory. train.py creates a {loss}_ep{epochs}_{timestamp} subfolder for each run.
# Model/image/loss metadata is written inside TensorBoard under run/config and HParams.
run_dir: ../runs
